        body {

            line-height: 1.6;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .layout {

            grid-template-columns: 220px minmax(0, 1fr);
            min-height: 100vh;
        }

        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            background: var(--surface-light);
            color: var(--disabled-text);
            border-right: 1px solid #d1d5db;
            padding: 10px 0;
        }

        .sidebar-title {
            padding: 10px 12px;
            font-weight: 800;
            color: #111827;
            letter-spacing: 0.03em;
        }

        .sidebar-subtitle {
            padding: 0 12px 10px;
            color: #64748b;
            font-size: 0.78rem;
            line-height: 1.4;
        }

        .period-nav {
            display: flex;
            flex-direction: column;
        }

        .period-button {
            appearance: none;
            border: 0;
            border-bottom: 1px solid #e5e7eb;
            background: transparent;
            color: #111827;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 11px 12px;
            text-align: left;

            width: 100%;
        }

        .period-button:hover,

            background: var(--surface-light-active);
            font-weight: 700;
        }

        .period-meta {
            color: #64748b;
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            margin-top: 2px;
        }

        .main {
            padding: 28px 18px 48px;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 22px;
            padding: 24px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(24, 24, 27, 0.82);
            box-shadow: 0 14px 44px rgba(2, 6, 23, 0.24);
        }

        header h1 {
            color: var(--accent-color);
            margin: 0 0 8px;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            letter-spacing: 0.5px;
        }

        .meta-info {
            color: var(--text-muted);
            font-size: 0.96rem;
        }

        .quick-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 18px;
        }

        .quick-links a {
            border: 1px solid var(--border-color);
            border-radius: 999px;
            color: var(--text-main);
            font-size: 0.86rem;
            font-weight: 700;
            padding: 7px 11px;
            text-decoration: none;
        }

        .quick-links a:hover {
            background: var(--accent-soft);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin-bottom: 18px;
        }

        .search-container input,
        .view-tabs button {
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
        }

        #searchInput {
            width: 100%;
            padding: 13px 16px;
            outline: none;
        }

        #searchInput:focus { border-color: var(--accent-color); }

        .view-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .view-tabs button {
            cursor: pointer;
            padding: 10px 15px;
            font-weight: 700;
        }

        .view-tabs button.active {
            background: var(--accent-strong);
            border-color: var(--accent-color);
            color: white;
        }

        .database-panel {
            display: grid;
            gap: 14px;
            margin-bottom: 18px;
        }

        .overview-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .overview-card,
        .period-summary,
        .keyword-panel {
            background: rgba(24, 24, 27, 0.86);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
        }

        .overview-label {
            color: var(--text-muted);
            font-size: 0.78rem;
            margin-bottom: 4px;
        }

        .overview-value {
            color: var(--text-main);
            font-size: 1.45rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .period-summary {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .keyword-panel {
            display: none;
            margin-bottom: 18px;
        }

        .keyword-panel.active { display: block; }

        .keyword-panel h2 {
            font-size: 1rem;
            margin: 0 0 10px;
        }

        .keyword-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 0 0 18px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .stat-pill {
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: rgba(36, 38, 41, 0.78);
            padding: 5px 10px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .news-card {
            background: rgba(36, 38, 41, 0.94);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .news-card:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.7);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

            background-color: #334155;
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 999px;
            font-weight: 600;

            line-height: 1.45;

            display: block;

            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 4px;

            font-size: 0.95rem;
            margin: 0 0 16px;
            text-align: justify;
        }

            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

            background-color: var(--tag-bg);
            color: var(--tag-text);
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
        }

        .tech-tag.infrastructure-gap {
            background-color: var(--alert-bg);
            color: var(--alert-text);
        }

            display: none;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 28px;
            text-align: center;
            color: var(--text-muted);

            color: var(--accent-color);

            display: block;

            .period-meta { display: none; }
            .toolbar { grid-template-columns: 1fr; }
            .view-tabs { justify-content: stretch; }
            .view-tabs button { flex: 1; }
            .main { padding: 18px 12px 36px; }
            .overview-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 480px) {
            .overview-grid { grid-template-columns: 1fr; }
            .news-grid { grid-template-columns: 1fr; }

    </style>
</head>

        {

            enTitle: '[Manufacturing AI News: Top AI Trends in Manufacturing (2026)]',
            url: 'https://www.implementation.com/manufacturing-ai-news-top-ai-trends-in-manufacturing-2026/',
            desc: '權威機構發布製造業 AI 最新發展報告，深度拆解 2026 年全球智慧製造的核心驅動趨勢、轉型路徑與技術整合要點。',

    let activePeriod = '0616-0630';
    let activeView = 'period';

    const periodNav = document.getElementById('periodNav');
    const newsGrid = document.getElementById('newsGrid');
    const searchInput = document.getElementById('searchInput');
    const stats = document.getElementById('stats');
    const pageTitle = document.getElementById('pageTitle');
    const pageMeta = document.getElementById('pageMeta');
    const emptyState = document.getElementById('emptyState');
    const databasePanel = document.getElementById('databasePanel');
    const keywordPanel = document.getElementById('keywordPanel');
    const keywordCloud = document.getElementById('keywordCloud');

    function itemsForPeriod(periodId) {
        return newsItems.filter(item => item.period === periodId);
    }

    function escapeHTML(value) {
        return String(value).replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[char]));
    }

    function routeFor(view, periodId = activePeriod) {
        if (view === 'period') return `#/period/${periodId}`;
        return `#/${view}`;
    }

    function syncHash() {
        const nextHash = routeFor(activeView, activePeriod);
        if (window.location.hash !== nextHash) {
            history.pushState(null, '', nextHash);
        }
    }

    function applyRouteFromHash() {
        const hash = window.location.hash.replace(/^#\/?/, '');
        const [route, value] = hash.split('/');

        if (route === 'period' && periods.some(period => period.id === value && period.type !== 'keywords')) {
            activeView = 'period';
            activePeriod = value;
            return;
        }

        if (['database', 'domestic', 'global', 'keywords'].includes(route)) {
            activeView = route;
            return;
        }

        if (route === 'keywords') {
            activeView = 'keywords';
        }
    }

    function renderPeriodNav() {
        periodNav.innerHTML = periods.map(period => {
            const count = period.type === 'keywords' ? uniqueTags().length : itemsForPeriod(period.id).length;
            const isActive = period.type === 'keywords' ? activeView === 'keywords' : activeView === 'period' && period.id === activePeriod;
            const meta = period.type === 'keywords' ? `${count} 個標籤` : count ? `${count} 則新聞` : '待匯入';

            return `
            <button type="button" class="period-button ${isActive ? 'active' : ''}" data-period="${period.id}" data-type="${period.type || 'period'}">
                ${escapeHTML(period.label)}
                <span class="period-meta">${escapeHTML(meta)}</span>
            </button>`;
        }).join('');
    }

    function uniqueTags() {
        return [...new Set(newsItems.flatMap(item => item.tags))].sort((a, b) => a.localeCompare(b, 'zh-Hant'));
    }

    function renderOverview(items) {
        const domesticTotal = newsItems.filter(item => item.region === '國內').length;
        const globalTotal = newsItems.filter(item => item.region === '國外').length;
        const filledPeriods = periods.filter(period => period.type !== 'keywords' && itemsForPeriod(period.id).length).length;
        const activePeriodInfo = periods.find(period => period.id === activePeriod);

        databasePanel.innerHTML = `
            <div class="overview-grid">
                <div class="overview-card">
                    <div class="overview-label">資料庫總量</div>
                    <div class="overview-value">${newsItems.length}</div>
                </div>
                <div class="overview-card">
                    <div class="overview-label">國內新聞</div>
                    <div class="overview-value">${domesticTotal}</div>
                </div>
                <div class="overview-card">
                    <div class="overview-label">國外新聞</div>
                    <div class="overview-value">${globalTotal}</div>
                </div>
                <div class="overview-card">
                    <div class="overview-label">已匯入期別</div>
                    <div class="overview-value">${filledPeriods}</div>
                </div>
            </div>
            <div class="period-summary">
                目前視圖顯示 ${items.length} 則；作用期別為 ${escapeHTML(activePeriodInfo?.label || activePeriod)}。之後匯入 3 月以來新聞時，只要新增到 newsItems 並指定 period，就會自動出現在對應雙週頁面與完整資料庫。
            </div>
        `;
    }

    function itemMatchesQuery(item, query) {
        if (!query) return true;
        const haystack = [
            item.period, item.region, item.source, item.date, item.title, item.enTitle || '', item.desc,
            item.tags.join(' '), item.keywords
        ].join(' ').toLowerCase();
        return haystack.includes(query);
    }

    function currentItems() {
        const query = searchInput.value.trim().toLowerCase();
        return newsItems.filter(item => {
            const viewMatch = activeView === 'database'
                || (activeView === 'period' && item.period === activePeriod)
                || (activeView === 'domestic' && item.region === '國內')
                || (activeView === 'global' && item.region === '國外')
                || activeView === 'keywords';
            return viewMatch && itemMatchesQuery(item, query);
        });
    }

    function renderKeywords() {
        const tags = uniqueTags();
        keywordPanel.classList.toggle('active', activeView === 'keywords');
        keywordCloud.innerHTML = tags.map(tag => `
            <button type="button" class="tech-tag" data-tag="${escapeHTML(tag)}">${escapeHTML(tag)}</button>
        `).join('');
    }

    function renderNews() {
        const items = currentItems();
        const activePeriodInfo = periods.find(period => period.id === activePeriod);
        const domesticCount = items.filter(item => item.region === '國內').length;
        const globalCount = items.filter(item => item.region === '國外').length;

        if (activeView === 'database') {
            pageTitle.textContent = '製造業 AI 新聞完整資料庫';
            pageMeta.textContent = '跨期整合國內與國外新聞；未來匯入 3 月以來資料時，會自動納入此資料庫搜尋。';
        } else if (activeView === 'domestic') {
            pageTitle.textContent = '國內製造業 AI 新聞資料庫';
            pageMeta.textContent = '聚焦台灣企業、供應鏈、ESG、智慧製造與邊緣 AI 應用。';
        } else if (activeView === 'global') {
            pageTitle.textContent = '國外製造業 AI 新聞資料庫';
            pageMeta.textContent = '追蹤跨國技術趨勢、Agentic AI、機器人、數位孿生與 AI 基礎設施。';
        } else if (activeView === 'keywords') {
            pageTitle.textContent = '製造業 AI 雙週報關鍵字';
            pageMeta.textContent = '點選任一標籤即可篩選完整資料庫，方便回頭整理主題趨勢。';
        } else {
            pageTitle.textContent = `製造業 AI 雙週新聞 ${activePeriod}`;
            pageMeta.textContent = `期間：${activePeriodInfo?.range || activePeriod}｜保留單期雙週頁面，也可切換完整資料庫。`;
        }

        renderOverview(items);
        renderKeywords();

        stats.innerHTML = `
            <span class="stat-pill">目前顯示：${items.length} 則</span>
            <span class="stat-pill">國內：${domesticCount} 則</span>
            <span class="stat-pill">國外：${globalCount} 則</span>
            <span class="stat-pill">資料總量：${newsItems.length} 則</span>
        `;

        newsGrid.innerHTML = items.map((item, index) => `
            <article class="news-card">
                <div class="card-header">
                    <span class="source-tag">${escapeHTML(item.source)} (${escapeHTML(item.date)})</span>
                    <span class="region-tag">${escapeHTML(item.region)}｜${escapeHTML(item.period)}</span>
                </div>
                <h2>
                    <a href="${escapeHTML(item.url)}" target="_blank" rel="noopener noreferrer">
                        ${index + 1}. ${escapeHTML(item.title)}
                        ${item.enTitle ? `<span class="en-title">${escapeHTML(item.enTitle)}</span>` : ''}
                        <span class="click-hint">開啟原文</span>
                    </a>
                </h2>
                <p class="news-desc">${escapeHTML(item.desc)}</p>
                <div class="tech-tags">
                    ${item.tags.map(tag => `<button type="button" class="tech-tag ${(item.alertTags || []).includes(tag) ? 'infrastructure-gap' : ''}" data-tag="${escapeHTML(tag)}">${escapeHTML(tag)}</button>`).join('')}
                </div>
            </article>
        `).join('');

        emptyState.textContent = activeView === 'period' && !itemsForPeriod(activePeriod).length
            ? `「${activePeriodInfo?.label || activePeriod}」尚未匯入新聞。之後新增資料時，這個期別頁面會自動顯示內容。`
            : '目前沒有符合條件的新聞。可切換「完整資料庫」或清除搜尋關鍵字。';
        emptyState.style.display = items.length ? 'none' : 'block';
        document.querySelectorAll('.view-tabs button').forEach(tab => tab.classList.toggle('active', tab.dataset.view === activeView));
    }

    periodNav.addEventListener('click', event => {
        const button = event.target.closest('.period-button');
        if (!button) return;
        if (button.dataset.type === 'keywords') {
            activeView = 'keywords';
        } else {
            activePeriod = button.dataset.period;
            activeView = 'period';
        }
        syncHash();
        renderPeriodNav();
        renderNews();
    });

    document.querySelector('.view-tabs').addEventListener('click', event => {
        const button = event.target.closest('button');
        if (!button) return;
        activeView = button.dataset.view;
        syncHash();
        renderPeriodNav();
        renderNews();
    });

    searchInput.addEventListener('input', renderNews);

    newsGrid.addEventListener('click', event => {
        const tag = event.target.closest('.tech-tag');
        if (!tag) return;
        searchInput.value = tag.dataset.tag;
        activeView = 'database';
        syncHash();
        renderPeriodNav();
        renderNews();
    });

    keywordCloud.addEventListener('click', event => {
        const tag = event.target.closest('.tech-tag');
        if (!tag) return;
        searchInput.value = tag.dataset.tag;
        activeView = 'database';
        syncHash();
        renderPeriodNav();
        renderNews();
    });

    window.addEventListener('popstate', () => {
        applyRouteFromHash();
        renderPeriodNav();
        renderNews();
    });

    applyRouteFromHash();
    if (!window.location.hash) syncHash();
    renderPeriodNav();
    renderNews();
</script>
